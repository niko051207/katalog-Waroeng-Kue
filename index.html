<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Toko Kue</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }

        /* Menyembunyikan Scrollbar Navigasi Kategori (Biar rapi di HP) */
        @layer utilities {
            .no-scrollbar::-webkit-scrollbar {
                display: none;
            }
            .no-scrollbar {
                -ms-overflow-style: none;
                scrollbar-width: none;
            }
        }

        /* Animasi Slide Up untuk Modal Keranjang saat Muncul */
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .animate-slide-up {
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen pb-24">

    <!-- 1. HEADER  -->
    <header class="sticky top-0 z-40 bg-white shadow-xs border-b border-gray-100 px-4 py-3 flex justify-between items-center">
        <h1 class="text-lg font-bold text-amber-700 tracking-tight">WAROENG KUE</h1>
        <button id="cart-btn" class="relative p-2 text-gray-600 hover:text-amber-700 transition">
            <!-- Ikon Keranjang Belanja -->
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 10.5V6a3.75 3.75 0 1 0-7.5 0v4.5m11.356-1.993 1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 0 1-1.12-1.243l1.264-12A1.125 1.125 0 0 1 5.513 7.5h12.974c.576 0 1.059.435 1.119 1.007ZM8.625 10.5a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm7.5 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z" />
            </svg>
            <!-- Badge Angka Item  -->
            <span id="cart-count" class="hidden absolute top-0 right-0 bg-red-500 text-white text-[10px] font-bold rounded-full w-4 h-4 flex items-center justify-center">0</span>
        </button>
    </header>

    <!-- 2. NAVIGASI KATEGORI  -->
    <nav class="sticky top-[53px] z-30 bg-white border-b border-gray-100 py-2.5 px-4 overflow-x-auto flex gap-2 no-scrollbar">
        <button class="category-filter active bg-amber-700 text-white text-sm font-medium px-4 py-1.5 rounded-full whitespace-nowrap shadow-xs">Semua</button>
        <button class="category-filter bg-gray-100 text-gray-600 hover:bg-gray-200 text-sm font-medium px-4 py-1.5 rounded-full whitespace-nowrap transition">Kering</button>
        <button class="category-filter bg-gray-100 text-gray-600 hover:bg-gray-200 text-sm font-medium px-4 py-1.5 rounded-full whitespace-nowrap transition">Basah</button>
        <!-- <button class="category-filter bg-gray-100 text-gray-600 hover:bg-gray-200 text-sm font-medium px-4 py-1.5 rounded-full whitespace-nowrap transition">Khusus PO</button> -->
    </nav>

    <!-- 3. KATALOG UTAMA  -->
    <main class="max-w-7xl mx-auto px-4 py-6">
        <div id="product-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <!-- JavaScript di Sini -->
        </div>
    </main>

    <!-- 4. BOTTOM BAR  -->
    <div id="bottom-bar" class="hidden fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-xl px-4 py-3 flex justify-between items-center z-40 max-w-md mx-auto md:rounded-t-2xl">
        <div>
            <p class="text-xs text-gray-500">Total Pesanan</p>
            <p id="bottom-total-price" class="text-base font-bold text-amber-800">Rp 0</p>
        </div>
        <button id="checkout-trigger" class="bg-amber-700 text-white font-semibold text-sm px-5 py-2.5 rounded-xl shadow-md hover:bg-amber-800 transition">
            Lihat Keranjang (<span id="bottom-cart-qty">0</span>)
        </button>
    </div>

    <!-- 5. MODAL CHECKOUT / POP-UP KERANJANG -->
    <div id="checkout-modal" class="hidden fixed inset-0 z-50 bg-black/50 items-end justify-center sm:items-center p-0 sm:p-4 transition-opacity duration-300">
        <div class="bg-white w-full max-w-md rounded-t-3xl sm:rounded-2xl shadow-xl flex flex-col max-h-[90vh] sm:max-h-[85vh] animate-slide-up">
            
            <!-- Header Modal -->
            <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center">
                <h2 class="text-base font-bold text-gray-800">Detail Pesanan Anda</h2>
                <button id="close-modal-btn" class="p-1 text-gray-400 hover:text-gray-600">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

            <!-- Konten Modal (Scrollable jika menunya banyak) -->
            <div class="p-6 overflow-y-auto space-y-6 flex-1">
                <!-- Ringkasan Item Belanjaan -->
                <div>
                    <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Item Kue</h3>
                    <div id="modal-cart-items" class="space-y-3 divide-y divide-gray-50">
                        <!-- Diisi otomatis via JS -->
                    </div>
                    <div class="flex justify-between items-center pt-3 border-t border-gray-100 mt-3">
                        <span class="text-sm font-semibold text-gray-700">Total Sementara</span>
                        <span id="modal-total-price" class="text-base font-bold text-amber-900">Rp 0</span>
                    </div>
                </div>

                <!-- Form Data Pelanggan (Hanya yang krusial) -->
                <form id="checkout-form" class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Nama Pemesan</label>
                        <input type="text" id="cust-name" required placeholder="Contoh: Budi Santoso" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-hidden focus:border-amber-700 transition">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Nomor WhatsApp Anda</label>
                        <input type="tel" id="cust-phone" required placeholder="Contoh: 081234xxx" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-hidden focus:border-amber-700 transition">
                    </div>
                    <!-- Bagian Metode Pengambilan -->
<div>
    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Metode Pengambilan</label>
    <div class="grid grid-cols-2 gap-3 mt-1">
        <!-- Ambil di Toko -->
        <label class="flex items-center justify-center border border-gray-200 rounded-xl p-3 cursor-pointer hover:bg-amber-50/50 has-checked:border-amber-700 has-checked:bg-amber-50">
            <input type="radio" name="method" value="Ambil di Toko" checked class="sr-only">
            <span class="text-xs font-semibold text-gray-700">Ambil di Toko</span>
        </label>
        <!-- Kirim Kurir Ojol (Sudah disembunyikan lingkaran radio button-nya) -->
        <label class="flex items-center justify-center border border-gray-200 rounded-xl p-3 cursor-pointer hover:bg-amber-50/50 has-checked:border-amber-700 has-checked:bg-amber-50">
            <input type="radio" name="method" value="Kirim Kurir Ojol" class="sr-only">
            <span class="text-xs font-semibold text-gray-700">Kirim Kurir Ojol</span>
        </label>
    </div>
</div>

<!-- Bagian Waktu Pengambilan (Diubah jadi Ketik Manual) -->
<div>
    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Waktu Pengambilan / Kirim</label>
    <input type="text" id="cust-time" required placeholder="Contoh: Minggu, 5 Juli, Jam 4 sore" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-hidden focus:border-amber-700 transition">
</div>

            <!-- Footer Modal (Tombol Eksekusi) -->
            <div class="p-4 border-t border-gray-100 bg-gray-50 sm:rounded-b-2xl">
                <button type="submit" form="checkout-form" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold text-sm py-3 rounded-xl shadow-md transition flex items-center justify-center gap-2">
                    <!-- Ikon WhatsApp -->
                    <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946C.06 5.348 5.397.01 12.008.01c3.202.001 6.212 1.246 8.477 3.514 2.266 2.268 3.507 5.28 3.505 8.484-.004 6.657-5.34 11.997-11.953 11.997-2.005-.001-3.973-.502-5.713-1.458L0 24zm6.59-4.846c1.6.95 3.488 1.449 5.411 1.451 5.428 0 9.85-4.417 9.854-9.848.002-2.63-1.023-5.101-2.885-6.965C17.164 1.868 14.693.843 12.01.843c-5.437 0-9.857 4.418-9.86 9.85-.002 1.95.508 3.856 1.479 5.551L2.621 21.37l5.242-1.375zM15.768 13.06c-.305-.152-1.807-.892-2.086-.994-.279-.101-.483-.152-.686.152-.204.304-.787.994-.965 1.197-.177.203-.355.228-.66.076-.304-.152-1.285-.474-2.449-1.512-.905-.806-1.516-1.802-1.694-2.107-.177-.304-.019-.469.133-.62.137-.136.305-.355.457-.533.151-.177.203-.304.304-.508.102-.203.051-.38-.025-.533-.076-.152-.686-1.653-.94-2.261-.247-.595-.503-.514-.686-.523-.177-.008-.38-.01-.583-.01-.203 0-.533.076-.812.38-.28.304-1.066 1.041-1.066 2.538 0 1.497 1.09 2.943 1.242 3.146.153.203 2.146 3.277 5.198 4.593.726.313 1.292.5 1.734.64.73.232 1.396.199 1.921.121.586-.087 1.807-.738 2.061-1.452.254-.715.254-1.326.177-1.452-.075-.127-.279-.203-.584-.355z"/></svg>
                    Kirim Pesanan (Hubungkan ke WA)
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>

    
</body>
</html>
